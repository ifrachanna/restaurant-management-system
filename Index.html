<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant Management System - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      max-width: 450px;
      width: 100%;
      animation: slideUp 0.5s ease;
    }
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px 30px;
      text-align: center;
    }
    .header h1 {
      font-size: 28px;
      margin-bottom: 10px;
      font-weight: 600;
    }
    .header p {
      font-size: 14px;
      opacity: 0.95;
    }
    .emoji {
      font-size: 50px;
      margin-bottom: 15px;
    }
    .form-container {
      padding: 40px 30px;
    }
    .role-toggle {
      display: flex;
      background: #f0f0f0;
      border-radius: 10px;
      padding: 5px;
      margin-bottom: 30px;
    }
    .role-btn {
      flex: 1;
      padding: 12px;
      border: none;
      background: transparent;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 500;
      color: #666;
    }
    .role-btn.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    .role-btn:hover:not(.active) {
      background: #e0e0e0;
    }
    .form-group {
      margin-bottom: 20px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      transition: all 0.3s ease;
      font-family: inherit;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
      position: relative;
      overflow: hidden;
    }
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }
    .login-btn:active {
      transform: translateY(0);
    }
    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .login-btn .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }
    @keyframes spin {
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }
    .login-btn.loading .btn-text {
      visibility: hidden;
    }
    .login-btn.loading .spinner {
      display: block;
    }
    .error-message {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
      border-left: 4px solid #c33;
    }
    .error-message.show {
      display: block;
      animation: shake 0.5s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }
    .hidden {
      display: none !important;
    }
    .info-text {
      text-align: center;
      color: #666;
      font-size: 13px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #e0e0e0;
    }
    .info-text strong {
      color: #667eea;
    }
    @media (max-width: 480px) {
      .container {
        border-radius: 15px;
      }
      .header {
        padding: 30px 20px;
      }
      .header h1 {
        font-size: 24px;
      }
      .form-container {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="emoji">🍽️</div>
      <h1>Restaurant Management</h1>
      <p>Welcome! Please login to continue</p>
    </div>
    <div class="form-container">
      <div class="role-toggle">
        <button class="role-btn active" data-role="customer">👤 Customer</button>
        <button class="role-btn" data-role="owner">👑 Owner</button>
      </div>
      <div class="error-message" id="errorMessage"></div>
      <form id="loginForm">
        <!-- Customer Form -->
        <div id="customerForm">
          <div class="form-group">
            <label for="customerName">Your Name</label>
            <input type="text" id="customerName" placeholder="Enter your name" required>
          </div>
        </div>
        <!-- Owner Form -->
        <div id="ownerForm" class="hidden">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter username">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password">
          </div>
        </div>
        <button type="submit" class="login-btn" id="loginBtn">
          <span class="btn-text">Login</span>
          <div class="spinner"></div>
        </button>
      </form>
      <div class="info-text">
        <strong>Owner credentials:</strong><br>
        Username: owner | Password: admin123
      </div>
    </div>
  </div>
  <script>
    let currentRole = 'customer';
    
    // Role toggle
    document.querySelectorAll('.role-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentRole = btn.dataset.role;
        const customerForm = document.getElementById('customerForm');
        const ownerForm = document.getElementById('ownerForm');
        const errorMessage = document.getElementById('errorMessage');
        
        if (currentRole === 'customer') {
          customerForm.classList.remove('hidden');
          ownerForm.classList.add('hidden');
          document.getElementById('customerName').required = true;
          document.getElementById('username').required = false;
          document.getElementById('password').required = false;
        } else {
          customerForm.classList.add('hidden');
          ownerForm.classList.remove('hidden');
          document.getElementById('customerName').required = false;
          document.getElementById('username').required = true;
          document.getElementById('password').required = true;
        }
        errorMessage.classList.remove('show');
      });
    });
    
    // Login form submit
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const loginBtn = document.getElementById('loginBtn');
      const errorMessage = document.getElementById('errorMessage');
      
      loginBtn.disabled = true;
      loginBtn.classList.add('loading');
      errorMessage.classList.remove('show');
      
      try {
        let payload = {};
        
        if (currentRole === 'customer') {
          const customerName = document.getElementById('customerName').value.trim();
          if (!customerName) {
            throw new Error('Please enter your name');
          }
          payload = {
            role: 'customer',
            customerName: customerName
          };
        } else {
          const username = document.getElementById('username').value.trim();
          const password = document.getElementById('password').value;
          if (!username || !password) {
            throw new Error('Please enter username and password');
          }
          payload = {
            role: 'owner',
            username: username,
            password: password
          };
        }
        
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          credentials: 'include',
          body: JSON.stringify(payload)
        });
        
        const data = await response.json();
        
        if (!response.ok || !data.success) {
          throw new Error(data.message || 'Login failed');
        }
        
        // Redirect based on role
        if (data.role === 'customer') {
          window.location.href = `customer.html?name=${encodeURIComponent(data.name)}`;
        } else {
          window.location.href = 'owner.html';
        }
      } catch (error) {
        console.error('Login error:', error);
        errorMessage.textContent = error.message || 'Login failed. Please try again.';
        errorMessage.classList.add('show');
        loginBtn.disabled = false;
        loginBtn.classList.remove('loading');
      }
    });
  </script>
</body>
</html>
